<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PayFlow | Contacts</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #020617;
      --bg-accent: #0f172a;
      --primary: #0ea5e9;
      --primary-hover: #38bdf8;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-shadow: 0 15px 35px -5px rgba(0, 0, 0, 0.5);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #020617;
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Mesh Gradients matching Profile/Wallet */
    .mesh-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; overflow: hidden; pointer-events: none; }
    .mesh-blob { position: absolute; border-radius: 50%; filter: blur(140px); animation: float 12s infinite ease-in-out alternate; opacity: 0.5; }
    .mesh-1 { background: linear-gradient(135deg, #38bdf8, #0ea5e9); width: 600px; height: 600px; top: -100px; left: -100px; }
    .mesh-2 { background: linear-gradient(135deg, #8b5cf6, #d946ef); width: 500px; height: 500px; bottom: -100px; right: 10%; animation-delay: -3s; }
    .mesh-3 { background: linear-gradient(135deg, #10b981, #14b8a6); width: 400px; height: 400px; top: 30%; left: 40%; animation-duration: 15s; }
    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(40px, -50px) scale(1.1); }
      100% { transform: translate(-30px, 40px) scale(0.9); }
    }

    .topbar {
      display: flex; justify-content: space-between; align-items: center; padding: 20px 40px;
      background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 50;
    }
    .header-title {
      display: flex; align-items: center; gap: 12px; font-size: 20px; font-weight: 800;
      background: linear-gradient(135deg, #fff, var(--primary));
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    .nav-btn {
      padding: 10px 18px; border-radius: 10px; border: 1px solid var(--glass-border);
      background: rgba(255, 255, 255, 0.05); color: white; font-weight: 600; cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); font-size: 13px;
    }
    .nav-btn:hover { background: rgba(255, 255, 255, 0.12); transform: translateY(-2px); }
    .btn-logout { background: rgba(239, 68, 68, 0.08); border-color: rgba(239, 68, 68, 0.3); color: #fca5a5; }
    .btn-logout:hover { background: rgba(239, 68, 68, 0.15); }

    .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: 380px 1fr; gap: 28px; }

    .card { background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 32px; box-shadow: var(--glass-shadow); animation: slideUp 0.6s ease-out; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    h2 { font-size: 18px; font-weight: 800; margin-bottom: 20px; color: #fff; letter-spacing: -0.5px; }

    .input-group { margin-bottom: 18px; }
    label { display: block; font-size: 11px; color: #64748b; font-weight: 700; text-transform: uppercase; margin-bottom: 6px; letter-spacing: 0.5px; }
    input { width: 100%; padding: 14px 16px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(0, 0, 0, 0.25); color: white; outline: none; transition: all 0.3s; font-size: 14px; font-family: inherit; }
    input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15); transform: translateY(-1px); }

    .primary-btn {
      width: 100%; padding: 16px; border: none; border-radius: 14px;
      background: linear-gradient(135deg, var(--primary), #6366f1);
      color: white; font-weight: 800; cursor: pointer;
      box-shadow: 0 8px 20px -8px rgba(14, 165, 233, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.3);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative; overflow: hidden;
    }
    .primary-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 15px 30px -8px rgba(14, 165, 233, 0.8); }
    .primary-btn::after { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(to right, transparent, rgba(255,255,255,0.2), transparent); transform: skewX(-20deg); }
    .primary-btn:hover:not(:disabled)::after { animation: shine 1s; }
    @keyframes shine { 100% { left: 200%; } }

    .contact-card {
      background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 18px; padding: 18px 24px; margin-bottom: 14px;
      display: flex; justify-content: space-between; align-items: center;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .contact-card:hover { transform: scale(1.02) translateY(-2px); background: rgba(255,255,255,0.05); border-color: var(--primary); box-shadow: 0 10px 25px -10px rgba(0,0,0,0.3); }
    .c-name { font-weight: 800; font-size: 16px; margin-bottom: 4px; letter-spacing: -0.3px; }
    .c-details { font-size: 12px; color: #94a3b8; line-height: 1.5; }

    .quick-btn {
      background: rgba(14, 165, 233, 0.08); color: var(--primary); padding: 9px 18px;
      border-radius: 10px; border: 1px solid rgba(14, 165, 233, 0.3);
      font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s;
    }
    .quick-btn:hover { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(14, 165, 233, 0.4); }

    #toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
      background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15); padding: 16px 28px;
      border-radius: 40px; font-weight: 600; font-size: 14px;
      transition: transform 0.4s cubic-bezier(0.16,1,0.3,1); z-index: 300; pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 768px) { .container { grid-template-columns: 1fr; } .topbar { padding: 15px 20px; } }
  </style>
</head>
<body>

<div class="mesh-bg">
  <div class="mesh-blob mesh-1"></div>
  <div class="mesh-blob mesh-2"></div>
  <div class="mesh-blob mesh-3"></div>
</div>

<div class="topbar">
  <div class="header-title"><span>👥</span> Contacts</div>
  <div style="display:flex; gap:10px;">
    <button class="nav-btn" onclick="window.location.href='home.html'">⬅ Dashboard</button>
    <button class="nav-btn btn-logout" onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">
  <div class="card" style="height: fit-content;">
    <h2>Register Recipient</h2>
    <p style="font-size: 13px; color: #64748b; margin-bottom: 25px;">Enter bank details for your global transfers.</p>

    <div class="input-group">
      <label>Recipient's Full Name</label>
      <input id="fullName" placeholder="Their Legal Name">
    </div>

    <div class="input-group">
      <label>Account / IBAN</label>
      <input id="accountNumber" placeholder="Account Number">
    </div>

    <div class="input-group">
      <label>SWIFT / BIC Code</label>
      <input id="swiftCode" placeholder="8-11 character code">
    </div>

    <div class="input-group">
      <label>Bank Name</label>
      <input id="bankName" placeholder="e.g. JPMorgan Chase">
    </div>

    <div class="input-group">
      <label>Recipient Address</label>
      <input id="address" placeholder="Physical Address">
    </div>

    <div class="input-group">
      <label>Country</label>
      <input id="country" placeholder="e.g. USA, UK, INDIA">
    </div>

    <button class="primary-btn" id="addBtn" onclick="addContact()">Save Beneficiary</button>
  </div>

  <div class="card">
    <h2>Saved Accounts</h2>
    <div id="list">
       <p style="color:#64748b; font-size:14px">Loading contacts...</p>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const token = sessionStorage.getItem("token");
if (!token) window.location.href = "index.html";

function logout() {
  sessionStorage.removeItem("token");
  window.location.href = "index.html";
}

function showToast(msg, color = "#22c55e") {
  const t = document.getElementById("toast");
  t.innerHTML = msg;
  t.style.borderLeft = `4px solid ${color}`;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3500);
}

async function loadContacts() {
  try {
    const res = await fetch("https://payflow-transaction-service.onrender.com/beneficiaries", {
      headers: { "Authorization": "Bearer " + token }
    });
    const data = await res.json();
    const list = document.getElementById("list");

    if (!data.length) {
      list.innerHTML = `<p style="color:#64748b; font-size:14px">No contacts saved yet.</p>`;
      return;
    }

    list.innerHTML = "";
    data.forEach(c => {
      if (!c.fullName && !c.username) return;

      const div = document.createElement("div");
      div.className = "contact-card";

      const displayName = c.fullName || (c.username ? "@" + c.username : "Contact");
      const displayBank = c.bankName || (c.swiftCode ? "External Bank" : "PayFlow Hub");
      const displayAcc  = c.accountNumber || c.username || "N/A";
      const displayBIC  = c.swiftCode || "N/A";
      const displayCountry = c.country || "Global";

      let flag = "🌍";
      const checkC = String(displayCountry).toUpperCase();
      if(checkC.includes("USA")) flag = "🇺🇸";
      else if(checkC.includes("INDIA")) flag = "🇮🇳";
      else if(checkC.includes("UK")) flag = "🇬🇧";
      else if(checkC.includes("CANADA")) flag = "🇨🇦";
      else if(checkC.includes("AUSTRALIA")) flag = "🇦🇺";
      else if(checkC.includes("GERMANY")) flag = "🇩🇪";
      else if(checkC.includes("JAPAN")) flag = "🇯🇵";
      else if(checkC.includes("UAE")) flag = "🇦🇪";

      div.innerHTML = `
        <div style="flex:1">
          <div class="c-name" style="color: white; font-weight: 700;">${displayName} ${flag}</div>
          <div class="c-details" style="font-size: 11px; color: #94a3b8; margin-top:2px;">
            <span style="color: #38bdf8;">${displayBank}</span> &bull; ${displayAcc}<br>
            SWIFT: ${displayBIC} &bull; ${displayCountry}
          </div>
        </div>
        <button class="quick-btn">Pay Now</button>
      `;

      div.querySelector('button').onclick = () => {
         sessionStorage.setItem("swiftPayTo", JSON.stringify({
             fullName: displayName,
             accountNumber: displayAcc,
             swiftCode: displayBIC,
             country: displayCountry
         }));
         window.location.href = "home.html";
      };
      list.appendChild(div);
    });
  } catch (e) { console.error(e); }
}

async function addContact() {
  const data = {
    fullName: document.getElementById("fullName").value.trim(),
    accountNumber: document.getElementById("accountNumber").value.trim(),
    swiftCode: document.getElementById("swiftCode").value.trim(),
    bankName: document.getElementById("bankName").value.trim(),
    address: document.getElementById("address").value.trim(),
    country: document.getElementById("country").value.trim(),
  };

  const btn = document.getElementById("addBtn");

  if (!data.fullName) {
      showToast("❌ Please provide a name or PayFlow username.", "#ef4444");
      return;
  }

  if (data.accountNumber && !data.swiftCode) {
      showToast("⚠️ For bank accounts, a SWIFT/BIC code is required.", "#facc15");
      return;
  }

  btn.disabled = true;
  btn.innerText = "Saving...";

  try {
    const res = await fetch("https://payflow-transaction-service.onrender.com/beneficiaries", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
      body: JSON.stringify(data)
    });

     if (!res.ok) {
        showToast("❌ " + await res.text(), "#ef4444");
     } else {
        showToast("✅ Beneficiary added successfully!");
        document.querySelectorAll('input').forEach(i => i.value = "");
        loadContacts();
     }
  } catch(e) {
     console.error(e);
     showToast("❌ Error connecting to server", "#ef4444");
  }
  btn.disabled = false;
  btn.innerText = "Save Beneficiary";
}

loadContacts();
</script>
</body>
</html>
