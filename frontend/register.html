<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PayFlow | Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #020617;
      --primary: #0ea5e9;
      --primary-hover: #38bdf8;
      --glass-bg: rgba(15, 23, 42, 0.35);
      --glass-border: rgba(255, 255, 255, 0.12);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #020617;
      color: white;
      overflow: hidden;
      position: relative;
    }

    #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }

    .card-wrapper { perspective: 1200px; z-index: 10; position: relative; }

    .card {
      background: var(--glass-bg);
      padding: 45px 40px;
      border-radius: 28px;
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border: 1px solid var(--glass-border);
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.8), 0 0 80px -20px rgba(139, 92, 246, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.15);
      transform-style: preserve-3d;
      transition: transform 0.1s ease-out, box-shadow 0.3s ease;
      transform: translateY(40px) rotateX(5deg);
      opacity: 0;
      animation: cardEntry 1s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
    }

    @keyframes cardEntry { to { transform: translateY(0) rotateX(0deg); opacity: 1; } }

    .card::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 30px;
      background: conic-gradient(from 0deg, #8b5cf6, #0ea5e9, #d946ef, #10b981, #8b5cf6);
      z-index: -1;
      opacity: 0;
      transition: opacity 0.5s;
      filter: blur(8px);
    }
    .card:hover::before { opacity: 0.35; }

    .header { margin-bottom: 28px; transform: translateZ(30px); }

    h1 {
      font-size: 26px;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, #94a3b8, #8b5cf6);
      background-size: 200% 200%;
      animation: gradShift 4s ease infinite;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    @keyframes gradShift { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

    .icon {
      font-size: 36px;
      margin-bottom: 10px;
      display: inline-block;
      filter: drop-shadow(0 0 20px rgba(139, 92, 246, 0.7));
      animation: iconFloat 3s ease-in-out infinite;
    }
    @keyframes iconFloat { 0%, 100% { transform: translateY(0) rotateY(0deg); } 50% { transform: translateY(-8px) rotateY(15deg); } }

    p.subtitle { color: #94a3b8; font-size: 14px; margin-top: 6px; }

    .input-group { margin-bottom: 14px; text-align: left; transform: translateZ(15px); }

    input, select {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(0, 0, 0, 0.4);
      color: white;
      font-size: 15px;
      font-family: inherit;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      outline: none;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
    }
    input::placeholder { color: #64748b; }
    select option { background: #0f172a; color: white; }

    input:focus, select:focus {
      border-color: #38bdf8;
      background: rgba(0, 0, 0, 0.6);
      box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.12), 0 0 30px -5px rgba(139, 92, 246, 0.15);
      transform: translateY(-2px) scale(1.01);
    }

    .btn-3d {
      width: 100%;
      padding: 16px;
      margin-top: 16px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #8b5cf6, #6366f1);
      color: white;
      font-weight: 800;
      font-size: 16px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transform: translateZ(25px);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 6px 0 0 #4c1d95, 0 10px 25px -5px rgba(139, 92, 246, 0.5), inset 0 1px 0 rgba(255,255,255,0.25);
    }
    .btn-3d:hover { transform: translateZ(25px) translateY(-2px); box-shadow: 0 8px 0 0 #4c1d95, 0 16px 30px -8px rgba(139, 92, 246, 0.7), inset 0 1px 0 rgba(255,255,255,0.25); }
    .btn-3d:active { transform: translateZ(25px) translateY(2px); box-shadow: 0 3px 0 0 #4c1d95, 0 5px 10px -3px rgba(139, 92, 246, 0.3); }
    .btn-3d::after { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(to right, transparent, rgba(255,255,255,0.2), transparent); transform: skewX(-20deg); }
    .btn-3d:hover::after { animation: shine 1s; }

    @keyframes shine { 100% { left: 200%; } }

    .msg { margin-top: 16px; font-size: 14px; font-weight: 500; min-height: 20px; transform: translateZ(10px); }
    .footer-text { margin-top: 24px; font-size: 14px; color: #94a3b8; transform: translateZ(10px); }
    a { color: var(--primary-hover); text-decoration: none; font-weight: 600; transition: all 0.3s; }
    a:hover { color: white; text-shadow: 0 0 12px rgba(56, 189, 248, 0.5); }

    .btn-content { display: inline-block; }
    .loader { display: none; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="card-wrapper">
  <div class="card" id="regCard">
    <div class="header">
      <span class="icon">🌍</span>
      <h1>Join PayFlow</h1>
      <p class="subtitle">Start sending money globally</p>
    </div>

    <div class="input-group">
      <input id="username" placeholder="Choose a Username" autocomplete="off">
    </div>
    <div class="input-group">
      <input id="password" type="password" placeholder="Secure Password" autocomplete="new-password">
    </div>
    <div class="input-group">
      <select id="country" required>
        <option value="" disabled selected>Select your Region</option>
        <option value="USA">United States (USD) 🇺🇸</option>
        <option value="INDIA">India (INR) 🇮🇳</option>
        <option value="UK">United Kingdom (GBP) 🇬🇧</option>
        <option value="CANADA">Canada (CAD) 🇨🇦</option>
        <option value="AUSTRALIA">Australia (AUD) 🇦🇺</option>
        <option value="GERMANY">Germany (EUR) 🇩🇪</option>
        <option value="JAPAN">Japan (JPY) 🇯🇵</option>
        <option value="UAE">UAE (AED) 🇦🇪</option>
      </select>
    </div>

    <button class="btn-3d" id="regBtn" onclick="register()">
      <span class="btn-content" id="btnContent">Create Account</span>
      <div class="loader" id="btnLoader"></div>
    </button>

    <p class="msg" id="msg"></p>
    <p class="footer-text">
      Already have an account? <a href="index.html">Log in here</a>
    </p>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// 🌐 THREE.JS — GLOBE (same as login)
(function() {
  const canvas = document.getElementById('bg-canvas');
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  camera.position.z = 3.5;

  const count = 1500;
  const positions = new Float32Array(count * 3);
  const colors = new Float32Array(count * 3);

  for (let i = 0; i < count; i++) {
    const phi = Math.acos(2 * Math.random() - 1);
    const theta = 2 * Math.PI * Math.random();
    const r = 1.2 + Math.random() * 0.1;
    positions[i*3] = r * Math.sin(phi) * Math.cos(theta);
    positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    positions[i*3+2] = r * Math.cos(phi);
    const color = new THREE.Color();
    color.setHSL(0.7 + Math.random() * 0.15, 0.7, 0.5 + Math.random() * 0.3);
    colors[i*3] = color.r; colors[i*3+1] = color.g; colors[i*3+2] = color.b;
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  const mat = new THREE.PointsMaterial({ size: 0.012, vertexColors: true, transparent: true, opacity: 0.7 });
  const globe = new THREE.Points(geo, mat);
  scene.add(globe);

  for (let i = 0; i < 3; i++) {
    const ringGeo = new THREE.RingGeometry(1.35 + i * 0.12, 1.36 + i * 0.12, 80);
    const ringMat = new THREE.MeshBasicMaterial({ color: 0x8b5cf6, transparent: true, opacity: 0.06, side: THREE.DoubleSide });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI / 2 + i * 0.3;
    ring.rotation.y = i * 0.5;
    scene.add(ring);
  }

  function animate() {
    requestAnimationFrame(animate);
    globe.rotation.y += 0.002;
    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
})();

// 🃏 3D TILT
const card = document.getElementById('regCard');
const wrapper = document.querySelector('.card-wrapper');
wrapper.addEventListener('mousemove', (e) => {
  const rect = wrapper.getBoundingClientRect();
  const rotateX = ((e.clientY - rect.top - rect.height/2) / rect.height) * -8;
  const rotateY = ((e.clientX - rect.left - rect.width/2) / rect.width) * 8;
  card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
});
wrapper.addEventListener('mouseleave', () => {
  card.style.transform = 'rotateX(0deg) rotateY(0deg)';
});

// 🔐 REGISTER LOGIC (preserved)
async function register() {
  const username = document.getElementById("username");
  const password = document.getElementById("password");
  const country = document.getElementById("country");
  const msg = document.getElementById("msg");
  const btn = document.getElementById("regBtn");
  const btnContent = document.getElementById("btnContent");
  const btnLoader = document.getElementById("btnLoader");

  msg.innerText = "";
  msg.style.color = "";

  if (!username.value || !password.value || !country.value) {
    msg.innerText = "⚠️ Please fill all fields";
    msg.style.color = "#ef4444";
    return;
  }

  btn.disabled = true;
  btn.style.opacity = "0.7";
  btnContent.style.display = "none";
  btnLoader.style.display = "block";

  try {
    const res = await fetch("https://payflow-transaction-service.onrender.com/register", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ username: username.value, password: password.value, country: country.value })
    });

    if (res.ok) {
      msg.innerText = "✅ Account created!";
      msg.style.color = "#22c55e";
      setTimeout(() => { window.location.href = "index.html"; }, 1500);
    } else {
      const text = await res.text();
      msg.innerText = "❌ " + text;
      msg.style.color = "#ef4444";
      resetBtn();
    }
  } catch (err) {
    msg.innerText = "❌ Server unreachable!";
    msg.style.color = "#ef4444";
    resetBtn();
  }

  function resetBtn() {
    btn.disabled = false;
    btn.style.opacity = "1";
    btnContent.style.display = "inline-block";
    btnLoader.style.display = "none";
  }
}
</script>
</body>
</html>
