<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PayFlow | Wallet</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #020617;
      --bg-accent: #0f172a;
      --primary: #0ea5e9;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-shadow: 0 15px 35px -5px rgba(0, 0, 0, 0.5);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: #020617;
      color: white;
      overflow-x: hidden;
      position: relative;
    }

    /* Extra Premium Mesh Gradients */
    .mesh-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; overflow: hidden; pointer-events: none; }
    .mesh-blob { position: absolute; border-radius: 50%; filter: blur(140px); animation: float 12s infinite ease-in-out alternate; opacity: 0.6; }
    .mesh-1 { background: linear-gradient(135deg, #38bdf8, #0ea5e9); width: 600px; height: 600px; top: -100px; left: -100px; }
    .mesh-2 { background: linear-gradient(135deg, #8b5cf6, #d946ef); width: 500px; height: 500px; bottom: -100px; right: 10%; animation-delay: -3s; }
    .mesh-3 { background: linear-gradient(135deg, #10b981, #14b8a6); width: 400px; height: 400px; top: 30%; left: 40%; animation-duration: 15s; }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(40px, -50px) scale(1.1); }
      66% { transform: translate(-30px, 40px) scale(0.9); }
      100% { transform: translate(0, 0) scale(1); }
    }

    .topbar {
      display: flex; justify-content: space-between; align-items: center; padding: 20px 40px;
      background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(12px); border-bottom: 1px solid var(--glass-border);
      position: sticky; top: 0; z-index: 50;
    }
    .header-title { display: flex; align-items: center; gap: 12px; font-size: 20px; font-weight: 800; }
    .nav-btn {
      padding: 10px 18px; border-radius: 10px; border: 1px solid var(--glass-border); background: rgba(255, 255, 255, 0.05);
      color: white; font-weight: 600; cursor: pointer; transition: all 0.3s; font-size: 13px;
    }
    .nav-btn:hover { background: rgba(255, 255, 255, 0.12); transform: translateY(-2px); }
    .btn-logout { background: rgba(239, 68, 68, 0.08); border-color: rgba(239, 68, 68, 0.3); color: #fca5a5; }

    .container { max-width: 500px; margin: 40px auto; padding: 0 20px; }

    .card {
      background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
      border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 24px; padding: 35px;
      box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.2);
      animation: fadeIn 0.6s ease-out;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    h2 { font-size: 20px; font-weight: 800; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

    .input-group { margin-bottom: 16px; }
    .input-group label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    input { width: 100%; padding: 14px 16px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(0, 0, 0, 0.25); color: white; font-size: 15px; outline: none; transition: all 0.3s; font-family: inherit; }
    input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15); }

    .primary-btn {
      width: 100%; padding: 18px; margin-top: 12px; border: none; border-radius: 16px;
      background: linear-gradient(135deg, #0ea5e9, #6366f1); color: white; font-weight: 800; font-size: 17px;
      cursor: pointer; box-shadow: 0 10px 25px -5px rgba(14, 165, 233, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.3);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); position: relative; overflow: hidden;
    }
    .primary-btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 20px 30px -10px rgba(99, 102, 241, 0.8); }
    .primary-btn:disabled { opacity: 0.7; cursor: not-allowed; }

    /* Credit Card Mock */
    .mock-card {
      background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02)); border-radius: 20px; padding: 30px; margin-bottom: 24px; border: 1px solid rgba(255,255,255,0.2); position: relative; overflow: hidden;
      transform: perspective(1000px) rotateX(10deg) rotateY(-5deg); transition: transform 0.5s; cursor: pointer;
    }
    .mock-card:hover { transform: perspective(1000px) rotateX(0deg) rotateY(0deg) scale(1.05); }
    .card-chip { width: 45px; height: 32px; background: linear-gradient(135deg, #fbbf24, #f59e0b); border-radius: 6px; margin-bottom: 24px; }
    .card-num { font-size: 22px; letter-spacing: 4px; color: #f8fafc; font-family: monospace; font-weight: 700; margin-bottom: 15px; }
    .card-name { font-size: 14px; color: #cbd5e1; text-transform: uppercase; letter-spacing: 2px; font-weight: 600;}
    
    #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: rgba(15,23,42,0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.2); padding: 16px 28px; border-radius: 40px; font-weight: 600; transition: transform 0.4s; z-index: 100; font-size: 14px; }
    #toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="mesh-bg">
  <div class="mesh-blob mesh-1"></div>
  <div class="mesh-blob mesh-2"></div>
  <div class="mesh-blob mesh-3"></div>
</div>

<div class="topbar">
  <div class="header-title"><span>👛</span> Wallet</div>
  <div id="topBalBadge" style="margin-left:auto; margin-right: 15px; font-size: 13px; font-weight: 700; background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); color: #34d399; padding: 6px 14px; border-radius: 20px;">
    Bal: <span id="topBalance">...</span>
  </div>
  <div style="display:flex; gap:10px;">
    <button class="nav-btn" onclick="window.location.href='home.html'">⬅ Back</button>
    <button class="nav-btn btn-logout" onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">
  <div class="card">
    <h2>Linked Method</h2>
    <div class="mock-card">
      <div class="card-chip"></div>
      <div class="card-num">**** **** **** 4092</div>
      <div class="card-name">Primary Bank Account</div>
    </div>
    <div class="input-group">
      <label id="amtLabel">Deposit Amount</label>
      <input id="depAmount" type="number" placeholder="0.00">
    </div>
    <button class="primary-btn" id="depBtn" onclick="depositFunds()">Deposit Now</button>
  </div>
</div>

<div id="toast"></div>

<script>
const token = sessionStorage.getItem("token");
if (!token) window.location.href = "index.html";

function logout() { sessionStorage.removeItem("token"); window.location.href = "index.html"; }

function showToast(msg, bg="#22c55e") {
  const t = document.getElementById("toast");
  t.innerHTML = msg; t.style.borderLeft = `4px solid ${bg}`; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3500);
}

async function loadBalance() {
  try {
    const res = await fetch("http://localhost:3001/me", { headers: { Authorization: "Bearer " + token } });
    const data = await res.json();
    document.getElementById("topBalance").innerText = data.balance.toLocaleString() + " " + data.currency;
    document.getElementById("amtLabel").innerText = `Amount (${data.currency})`;
  } catch(e) {}
}

async function depositFunds() {
  const amount = Number(document.getElementById("depAmount").value);
  if (isNaN(amount) || amount <= 0) { showToast("⚠️ Enter a valid amount", "#ef4444"); return; }
  const btn = document.getElementById("depBtn");
  btn.disabled = true; btn.innerText = "Processing...";
  try {
    const res = await fetch("http://localhost:3001/deposit", {
      method: "POST", headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
      body: JSON.stringify({ amount })
    });
    if (res.ok) { showToast("✅ Deposit successful!"); loadBalance(); setTimeout(() => window.location.href='home.html', 1500); }
    else throw new Error();
  } catch (err) { showToast("❌ Deposit failed", "#ef4444"); btn.disabled = false; btn.innerText = "Deposit Now"; }
}

loadBalance();
</script>
</body>
</html>
