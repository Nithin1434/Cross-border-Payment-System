server {
    listen 80;
    server_name localhost;

    # Frontend Static Files
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to Transaction Service
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://transaction-service:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional: Direct access to Currency Service if needed by frontend
    location /api/currency/ {
        rewrite ^/api/currency/(.*)$ /$1 break;
        proxy_pass http://currency-service:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
